{% extends "lay.html" %}
    {% block content%}
    <video autoplay muted loop playsinline
       style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: -1;">
    <source src="{{ url_for('static', filename='gg.mp4') }}" type="video/mp4">
</video>
        <h1>Upload your PDF file</h1>
        <form action="/" method="POST" enctype="multipart/form-data">
            <input type="file" name="pdf" accept=".pdf" required>
            <button type="submit">Submit PDF</button>
        </form>
    {% endblock %}
